<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <title>F1 Tracks</title>
</head>
<body>
<h1>F1 Tracks</h1>
<a href="/tracks/new">Add new track</a>
<a href="/drivers">View Drivers</a>

<form th:action="@{/tracks}" method="get">
  <input type="text" name="country" placeholder="Country" th:value="${country}"/>
  <input type="text" name="city" placeholder="City" th:value="${city}"/>
  <button type="submit">Filter</button>
  <a href="/tracks">Clear</a>
</form>

<table>
  <thead>
  <tr>
    <th>Name</th>
    <th>Country</th>
    <th>City</th>
    <th>Length (km)</th>
    <th>Corners</th>
    <th>Lap Record</th>
    <th>Actions</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="track : ${tracks}">
    <td th:text="${track.name}"></td>
    <td th:text="${track.country}"></td>
    <td th:text="${track.city}"></td>
    <td th:text="${track.circuitLengthKm}"></td>
    <td th:text="${track.numberOfCorners}"></td>
    <td th:text="${track.lapRecord}"></td>
    <td>
      <a th:href="@{/tracks/{id}/edit(id=${track.id})}">Edit</a>
      <form th:action="@{/tracks/{id}/delete(id=${track.id})}" method="post">
        <button type="submit">Delete</button>
      </form>
    </td>
  </tr>
  </tbody>
</table>

<div>
  <a th:if="${currentPage > 0}"
     th:href="@{/tracks(page=${currentPage - 1}, size=5, country=${country}, city=${city})}">
    Previous
  </a>
  <span th:text="${currentPage + 1} + ' / ' + ${totalPages}"></span>
  <a th:if="${currentPage + 1 < totalPages}"
     th:href="@{/tracks(page=${currentPage + 1}, size=5, country=${country}, city=${city})}">
    Next
  </a>
</div>

</body>
</html>
