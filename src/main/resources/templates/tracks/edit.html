<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <title>Edit Track</title>
</head>
<body>
<h1>Edit track</h1>
<form th:action="@{/tracks/{id}/edit(id=${track.id})}" th:object="${track}" method="post">
    <div>
        <label>Name</label>
        <input type="text" th:field="*{name}"/>
        <span th:errors="*{name}"></span>
    </div>
    <div>
        <label>Description</label>
        <input type="text" th:field="*{description}"/>
        <span th:errors="*{description}"></span>
    </div>
    <div>
        <label>Country</label>
        <input type="text" th:field="*{country}"/>
        <span th:errors="*{country}"></span>
    </div>
    <div>
        <label>City</label>
        <input type="text" th:field="*{city}"/>
        <span th:errors="*{city}"></span>
    </div>
    <div>
        <label>Lap Record</label>
        <input type="text" th:field="*{lapRecord}"/>
        <span th:errors="*{lapRecord}"></span>
    </div>
    <div>
        <label>Number of corners</label>
        <input type="number" th:field="*{numberOfCorners}"/>
        <span th:errors="*{numberOfCorners}"></span>
    </div>
    <div>
        <label>Circuit length (km)</label>
        <input type="number" step="0.001" th:field="*{circuitLengthKm}"/>
        <span th:errors="*{circuitLengthKm}"></span>
    </div>
    <button type="submit">Save</button>
    <a href="/tracks">Cancel</a>
</form>
</body>
</html>
