<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <title>F1 Drivers</title>
</head>
<body>
<h1>F1 Drivers</h1>
<a href="/drivers/new">Add new driver</a>
<table>
    <thead>
    <tr>
        <th>Number</th>
        <th>Name</th>
        <th>Team</th>
        <th>Nationality</th>
        <th>Championships</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="driver : ${drivers}">
        <td th:text="${driver.driverNumber}"></td>
        <td th:text="${driver.firstName + ' ' + driver.lastName}"></td>
        <td th:text="${driver.teamName}"></td>
        <td th:text="${driver.nationality}"></td>
        <td th:text="${driver.championships}"></td>
        <td>
            <a th:href="@{/drivers/{id}/edit(id=${driver.id})}">Edit</a>
            <form th:action="@{/drivers/{id}/delete(id=${driver.id})}" method="post">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
